# Welcome to Jekyll!

locale: "en-US"
site_theme: "default"
title: "Eng. Tefera Addis"
title_separator: "-"
name: &name "Tefera Addis SISAY"
description: &description "Academic portfolio of Tefera Addis SISAY"

url: https://tefera-addis-sisay.github.io
baseurl: ""
repository: "tefera-addis-sisay/tefera-addis-sisay.github.io"

# Site Author
author:
  avatar: "profile.png"
  name: "Tefera Addis SISAY"
  pronouns:
  bio: "Lecturer at Bahir Dar Institute of Technology (BiT), Bahir Dar, Ethiopia."
  location: "Bahir Dar, Ethiopia"
  employer: "Bahir Dar Institute of Technology"
  uri:
  email: "tefera.addis@bdu.edu.et"

  googlescholar: "https://scholar.google.com/citations?view_op=new_articles&hl=en&imq=Tefera+Addis#"
  orcid: "https://orcid.org/0009-0005-7483-7377"
  researchgate: "https://www.researchgate.net/profile/Tefera-Addis-Sisay-3?ev=hdr_xprf"
  linkedin: "https://www.linkedin.com/in/tefera-addis-a3b475343/"
  twitter: "https://x.com/teferaaddis777?s=21"
  youtube: "Habeshatube777"

publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Site Settings
teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

# COMMENTS
comments:
  provider:

# STATICMAN
staticman:
  allowedFields: ['name', 'email', 'url', 'message']
  branch: "gh-pages"
  commitMessage: "New comment."
  filename: comment-{@timestamp}
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ['name', 'email', 'message']

atom_feed:
  hide: false

# SEO
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# SOCIAL
twitter:
  username:
facebook:
  username:

og_image:
og_description:

social:
  type:
  name:
  links:

# ANALYTICS
analytics:
  provider: "false"

# FILES
include:
  - .htaccess
  - _pages
  - files

exclude:
  - node_modules
  - vendor

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# =========================
# ✅ MARKDOWN FIX (IMPORTANT)
# =========================
markdown: kramdown

kramdown:
  input: GFM

highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# =========================
# COLLECTIONS (FIXED)
# =========================
collections:
  teaching:
    output: true
    permalink: /:collection/:path/

  publications:
    output: true
    permalink: /:collection/:path/

  portfolio:
    output: true
    permalink: /:collection/:path/

  projects:
    output: true
    permalink: /:collection/:path/

  services:
    output: true
    permalink: /:collection/:path/

  talks:
    output: true
    permalink: /:collection/:path/

# =========================
# DEFAULTS
# =========================
defaults:

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      show_date: false
      read_time: false
      comments: false

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: services
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true
      share: true

# =========================
# SASS
# =========================
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

# =========================
# PLUGINS
# =========================
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# =========================
# ARCHIVES
# =========================
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# =========================
# HTML COMPRESSION
# =========================
compress_html:
  clippings: all
  ignore:
    envs: development
