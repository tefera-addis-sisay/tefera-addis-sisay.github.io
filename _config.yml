# Welcome to Jekyll!

locale                   : "en-US"
site_theme               : "default"
title                    : "Eng. Tefera Addis"
title_separator          : "-"
name                     : &name "Tefera Addis SISAY"
description              : &description "Academic portfolio of Tefera Addis SISAY"
url                      : https://tefera-addis-sisay.github.io
baseurl                  : ""
repository               : "tefera-addis-sisay/tefera-sisay.github.io"

author:
  avatar           : "profile.png"
  name             : "Tefera Addis SISAY"
  pronouns         :
  bio              : "Lecturer at Bahir Dar Institute of Technology (BiT), Bahir Dar, Ethiopia."
  location         : "Bahir Dar, Ethiopia"
  employer         : "Bahir Dar Institute of Technology"
  uri              :
  email            : "tefera.addis@bdu.edu.et"

  googlescholar    : "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  orcid            : "https://orcid.org/0009-0005-7483-7377"
  researchgate     : "https://www.researchgate.net/profile/Tefera-Addis-Sisay-3"
  linkedin         : "https://www.linkedin.com/in/tefera-addis-a3b475343/"
  twitter          : "https://x.com/teferaaddis777"
  youtube          : "Habeshatube777"

publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - vendor
  - package.json*
  - README
  - tmp

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# Collections (FIXED)
collections:
  teaching:
    output: true
    permalink: /:collection/:path/

  publications:
    output: true
    permalink: /:collection/:path/

  portfolio:
    output: true
    permalink: /:collection/:path/

  project:
    output: true
    permalink: /:collection/:path/

  services:
    output: true
    permalink: /:collection/:path/

  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      show_date: false
      read_time: false
      comments: false

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: project
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: services
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true
      share: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
